name: accelerator_1D
type: compute

operational_array:
  unit_energy: 0.04 # pJ
  unit_area: 1      # unit
  dimensions: [D1]
  sizes: [16]

memories:
  # Memories can be adjusted based on the new architecture, 
  # but for a starting point, we can reuse a similar hierarchy.
  # Note: Operand and port allocations might need to change based on 
  # how you map workload dimensions (e.g., OX, OY) to the 1D array.

  rf_1B_I2:
    size: 16
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [I2]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 16
        bandwidth_max: 16
        allocation:
          - I2, tl
      - name: w_port_1
        type: write
        bandwidth_min: 16
        bandwidth_max: 16
        allocation:
          - I2, fh
    served_dimensions: [] # Served dimensions might change

  rf_1B_I1:
    size: 16
    r_cost: 0.095
    w_cost: 0.095
    area: 0
    latency: 1
    operands: [I1]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 16
        bandwidth_max: 16
        allocation:
          - I1, tl
      - name: w_port_1
        type: write
        bandwidth_min: 16
        bandwidth_max: 16
        allocation:
          - I1, fh
    served_dimensions: [D1]

  rf_4B_O:
    size: 64 # 16 MACs * 4 bytes
    r_cost: 0.021
    w_cost: 0.021
    area: 0
    latency: 1
    operands: [O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 64
        bandwidth_max: 64
        allocation:
          - O, tl
      - name: w_port_1
        type: write
        bandwidth_min: 64
        bandwidth_max: 64
        allocation:
          - O, fh
    served_dimensions: []   # private to every PE

  # Higher-level memories like SRAMs would likely remain shared 
  # across the single dimension D1.
  sram_16KB_I2:
    size: 131072
    r_cost: 10.5
    w_cost: 12.8
    area: 0
    latency: 1
    operands: [I2]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 256
        bandwidth_max: 256
      - name: w_port_1
        type: write
        bandwidth_min: 256
        bandwidth_max: 256
    served_dimensions: [D1]

  sram_64KB_I1_O:
    size: 524288
    r_cost: 19.6
    w_cost: 22.5
    area: 0
    latency: 1
    operands: [I1, O]
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 512
        bandwidth_max: 512
      - name: w_port_1
        type: write
        bandwidth_min: 512
        bandwidth_max: 512
    served_dimensions: [D1]
